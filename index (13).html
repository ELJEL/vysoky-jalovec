<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vysoký jalovec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0e0d0b;
  --ink-m:  #2a2820;
  --ink-l:  #5a5650;
  --paper:  #f0ece3;
  --paper-d:#e8e3d8;
}

html, body {
  overflow: hidden;
  position: fixed;
  width: 100%;
  height: 100%;
  width: 100%; height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: 180px;
  pointer-events: none;
  z-index: 100;
  opacity: 1;
}

/* ===== PAGES ===== */
.page {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  min-height: 100vh;
}
.page.active { display: flex; }

/* ===== LANDING PAGE ===== */
#page-landing {
  justify-content: center;
  position: relative;
}

.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 40px 20px;
  width: 100%;
  max-width: 900px;
}

.canvas-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards 0.4s;
}

#treeCanvas {
  display: block;
  max-width: 560px;
  width: 100%;
}

.lyrics-block {
  margin-top: 12px;
  text-align: center;
  opacity: 0;
  animation: fadeUp 1.2s ease forwards 1.6s;
}

.lyrics-block p {
  font-family: 'IM Fell English', serif;
  font-size: clamp(15px, 2.2vw, 20px);
  line-height: 2.2;
  color: var(--ink-m);
  font-style: normal;
}

.lyrics-block em {
  font-style: italic;
}

.cta-block {
  margin: 28px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  opacity: 0;
  animation: fadeUp 1s ease forwards 2.4s;
  padding-bottom: 40px;
}

.cta-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-path {
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  padding: 11px 26px;
  border: 1px solid var(--ink-m);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
  position: relative;
}

.btn-path::after {
  content: '';
  position: absolute;
  inset: 3px;
  border: 0.5px solid var(--ink-l);
  opacity: 0;
  transition: opacity 0.2s;
}

.btn-path:hover { background: var(--ink); color: var(--paper); }
.btn-path:hover::after { opacity: 1; border-color: var(--paper-d); }

/* ===== PANEL (height input) ===== */
.panel {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  padding: 28px 36px;
  border: 1px solid var(--ink-m);
  background: var(--paper-d);
  position: relative;
  max-width: 380px;
  width: 90%;
  margin: 0 auto;
}

.panel::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 0.5px solid var(--ink-l);
  pointer-events: none;
}

.panel.visible {
  display: flex;
  animation: fadeUp 0.45s ease forwards;
}

.panel-title {
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--ink-m);
}

.height-unit {
  font-size: 14px;
  color: var(--ink-l);
  font-style: italic;
}

/* drum roller */
.roller-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  margin: 14px 0 10px;
}
.roller-drum {
  width: 52px;
  height: 160px;
  overflow: hidden;
  position: relative;
  cursor: ns-resize;
  user-select: none;
}
.roller-drum::before, .roller-drum::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 52px;
  z-index: 2;
  pointer-events: none;
}
.roller-drum::before { top: 0; background: linear-gradient(to bottom, var(--paper) 0%, transparent 100%); }
.roller-drum::after  { bottom: 0; background: linear-gradient(to top, var(--paper) 0%, transparent 100%); }
.roller-track {
  display: flex;
  flex-direction: column;
  transition: transform 0.18s cubic-bezier(0.25,0.8,0.25,1);
}
.roller-item {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 46px;
  line-height: 1;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  flex-shrink: 0;
}
.roller-sep {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 30px;
  color: var(--ink-m);
  padding-bottom: 4px;
  align-self: center;
}
/* centre line */
.roller-drum-wrap {
  position: relative;
}
.roller-drum-wrap::after {
  content: '';
  position: absolute;
  top: 50%; left: -4px; right: -4px;
  height: 1px;
  background: var(--ink-m);
  pointer-events: none;
  transform: translateY(-28px);
}

.btn-confirm {
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  padding: 10px 24px;
  border: 1px solid var(--ink-m);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: opacity 0.2s;
  width: 100%;
}
.btn-confirm:hover { opacity: 0.8; }

.btn-close {
  position: absolute;
  top: 9px; right: 13px;
  background: none; border: none;
  font-size: 18px; cursor: pointer;
  color: var(--ink-l);
  font-family: serif;
  line-height: 1;
}

/* ===== SINGING PAGE ===== */
#page-sing {
  justify-content: flex-start;
  animation: fadeIn 0.5s ease forwards;
}

.sing-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 820px;
  padding: 52px 40px 40px;
  gap: 0;
}

.back-btn {
  align-self: flex-start;
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--ink-l);
  background: none;
  border: none;
  cursor: pointer;
  margin-bottom: 40px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--ink); }
.back-btn::before { content: '← '; }

/* Score container */
.score-wrap {
  width: 100%;
  border-top: 1px solid var(--ink-m);
  border-bottom: 1px solid var(--ink-m);
  padding: 24px 0 20px;
  margin-bottom: 12px;
  overflow: hidden;
}

#score-abc-wrap {
  width: 100%;
  overflow: hidden;
}

#score-svg-wrap svg {
  width: 100% !important;
  height: auto !important;
}

/* override ABCJS default colors to match ink palette */
#score-abc-wrap svg {
  width: 100% !important;
  height: auto !important;
}
#score-abc-wrap svg path,
#score-abc-wrap svg rect,
#score-abc-wrap svg ellipse,
#score-abc-wrap svg polygon {
  fill: var(--ink-m) !important;
  stroke: var(--ink-m) !important;
}
#score-abc-wrap svg text {
  fill: var(--ink-m) !important;
  font-family: 'IM Fell English', serif !important;
  font-style: normal !important;
}
#score-abc-wrap svg text.abcjs-lyric {
  font-size: clamp(15px, 2.2vw, 20px) !important;
  fill: var(--ink-m) !important;
}
#score-abc-wrap .abcjs-staff line,
#score-abc-wrap line {
  stroke: var(--ink-m) !important;
}

.sing-instruction {
  font-family: 'IM Fell English', serif;
  font-size: clamp(13px, 1.8vw, 16px);
  color: var(--ink-m);
  font-style: italic;
  text-align: center;
  line-height: 1.9;
  margin: 28px 0 32px;
  max-width: 520px;
}

/* mic area */
.mic-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.mic-btn {
  width: 68px; height: 68px;
  border-radius: 50%;
  border: 1px solid var(--ink-m);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.mic-btn svg { width: 26px; height: 26px; color: var(--ink); }
.mic-btn:hover { background: var(--paper-d); }
.mic-btn.recording {
  background: var(--ink);
  animation: pulse 1.2s ease infinite;
}
.mic-btn.recording svg { color: var(--paper); }

.mic-status {
  font-family: 'IM Fell English', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--ink-l);
  min-height: 18px;
  text-align: center;
}

/* ===== REVEAL OVERLAY ===== */
.reveal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: var(--paper);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.reveal-overlay.visible {
  display: flex;
  animation: fadeIn 0.4s ease forwards;
}

.reveal-overlay canvas {
  max-width: 380px;
  width: 75vw;
}

.reveal-message {
  font-family: 'IM Fell English', serif;
  font-size: clamp(15px, 2.5vw, 21px);
  font-style: italic;
  color: var(--ink-m);
  text-align: center;
  padding: 0 24px;
  opacity: 0;
  animation: fadeUp 1s ease forwards 0.5s;
}

.reveal-sub {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-l);
  opacity: 0;
  animation: fadeUp 1s ease forwards 1s;
}

.btn-return {
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  padding: 11px 28px;
  border: 1px solid var(--ink-m);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.2s, color 0.2s;
  opacity: 0;
  animation: fadeUp 1s ease forwards 1.4s;
}
.btn-return:hover { background: var(--ink); color: var(--paper); }

.divider { width: 1px; height: 36px; background: var(--ink-l); opacity: 0.35; margin: 4px 0; }

/* ===== KEYFRAMES ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
@keyframes micSpin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes strokeFloat {
  0%   { transform: translate(0,0) rotate(0deg); opacity:0.7; }
  50%  { transform: translate(2px,-4px) rotate(8deg); opacity:1; }
  100% { transform: translate(0,0) rotate(0deg); opacity:0.7; }
}
/* ===== FOREST PAGE ===== */
#page-forest {
  justify-content: flex-start;
}

.forest-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 52px 40px 40px;
}

#forestCanvas {
  max-width: 100%;
  display: block;
}
</style>
</head>

<!-- ======= LANDING PAGE ======= -->
<div class="page active" id="page-landing">

  <!-- Height panel back button -->
  <button class="back-btn" id="heightBackBtn" style="display:none;position:absolute;top:52px;left:40px;" onclick="closeHeightPanel()">zpět</button>

<!-- ======= SINGING PAGE ======= -->
<div class="page" id="page-sing">

          </svg>
        </button>

      <span class="mic-status" id="micStatus">zpívej</span>

</div>

<!-- ======= FOREST PAGE ======= -->

  <div class="forest-inner">
    <button class="back-btn" onclick="goToLanding()">zpět</button>

    <canvas id="loadingStroke" style="position:absolute;top:0;left:0;pointer-events:none;display:none;"></canvas>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbqH1coWaccaFLVj7RiJ5WXKAZB_C0pvQ",
  authDomain: "jalovce-37d09.firebaseapp.com",
  projectId: "jalovce-37d09",
  storageBucket: "jalovce-37d09.firebasestorage.app",
  messagingSenderId: "287340973273",
  appId: "1:287340973273:web:e35a2725eb6cdcd66202c8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveTree = async function(heightCm, seed) {
  try {
    await addDoc(collection(db, "jalovce"), {
      height: heightCm,
      seed: seed,
      timestamp: Date.now()
    });
  } catch(e) { console.error("save failed", e); }
};

window.loadForest = async function() {
  try {
    const q = query(collection(db, "jalovce"), orderBy("timestamp", "asc"));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) { console.error("load failed", e); return []; }
};

// signal that Firebase is ready
window._firebaseReadyResolve && window._firebaseReadyResolve();
</script>

<!-- ABCJS for score rendering -->
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.3/dist/abcjs-basic-min.js"></script>

<script>
/* ======= NOISE / FBM ======= */
function noise(x,y,s){let n=Math.sin(x*127.1+y*311.7+(s||0)*74.3)*43758.5453;return n-Math.floor(n);}
function sn(x,y,s){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);const a=noise(ix,iy,s),b=noise(ix+1,iy,s),c=noise(ix,iy+1,s),d=noise(ix+1,iy+1,s);return a+(b-a)*ux+(c-a)*uy+(d-c)*ux*uy-(b-a)*ux*uy;}
function fbm(x,y,s,o){let v=0,amp=0.5,freq=1,max=0;for(let i=0;i<(o||4);i++){v+=sn(x*freq,y*freq,(s||0)+i*13)*amp;max+=amp;amp*=0.5;freq*=2.1;}return v/max;}

/* ======= COLOUR HELPERS ======= */
/* ======= DRAW JALOVEC ======= */
function drawJalovec(canvas, heightCm, seed, onDone, forceCx, forceBaseY, slotH, instant, spfOverride, noPaper) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const inkD='#0e0d0b', inkM='#2a2820', inkL='#5a5650';
  const refH = slotH !== undefined ? slotH : H;
  const treeH = Math.round((heightCm/210)*refH*0.78 + refH*0.12);
  const cx = forceCx !== undefined ? forceCx : W/2;
  const baseY = forceBaseY !== undefined ? forceBaseY : H-44;
  const topY = baseY-treeH, maxW = treeH*0.38;
  if(forceCx === undefined) ctx.clearRect(0,0,W,H);
  let progress=0;
  const totalStrokes=5000, spf=spfOverride||60;
  let af=null;

  const paper='#f0ece3';

  function drawStrokes(from, to, paperPass){
    for(let i=from;i<to;i++){
      const t=i/totalStrokes, y=topY+t*treeH, relY=t;
      const profile=Math.pow(relY,0.42)*(1-Math.pow(relY,9)*0.25);
      const bw=profile*maxW;
      const nL=fbm(0.3,relY*3.2,seed,4), nR=fbm(1.7,relY*3.2,seed+500,4);
      const wob=bw*0.32;
      const lx=cx-bw*(0.5+(nL-0.5)*0.6)-wob*(nL-0.3);
      const rx=cx+bw*(0.5+(nR-0.5)*0.6)+wob*(nR-0.3);
      const span=rx-lx; if(span<1)continue;
      const density=fbm(i*0.07,relY*2,seed+200,3);
      if(density<0.12)continue;
      const sc=Math.floor(density*7)+1;
      for(let s=0;s<sc;s++){
        const nx=fbm(s*3.1,i*0.13+s,seed+100,2);
        const x=lx+nx*span; if(x<lx||x>rx)continue;
        const edgeDist=Math.min(x-lx,rx-x)/span;
        const isEdge=edgeDist<0.10;
        const shadowN=fbm(x*0.018,y*0.018,seed+900,5);
        const clumpN=fbm(x*0.045,y*0.045,seed+410,4);
        const detailN=fbm(x*0.11,y*0.11,seed+620,3);
        const depthVal=shadowN*0.55+clumpN*0.30+detailN*0.15;
        let strokeLen,lw,alpha,col;
        if(paperPass && noPaper){ continue; }
        if(paperPass){
          strokeLen=3+depthVal*6; lw=1.2+depthVal*0.6; alpha=0.9; col=paper;
        } else if(isEdge){strokeLen=3+depthVal*8;lw=1.0+depthVal*0.8;alpha=0.75+depthVal*0.25;col=inkD;}
        else if(depthVal>0.62){strokeLen=2+depthVal*6;lw=0.9+depthVal*0.5;alpha=0.55+depthVal*0.35;col=inkD;}
        else if(depthVal>0.40){strokeLen=1.5+depthVal*4;lw=0.7;alpha=0.30+depthVal*0.30;col=inkM;}
        else{strokeLen=1+depthVal*3;lw=0.5;alpha=0.10+depthVal*0.20;col=inkL;}
        const angle=(fbm(x*0.05,y*0.05,seed+333,2)-0.5)*0.7;
        const hex=paperPass ? 'ff' : Math.round(alpha*255).toString(16).padStart(2,'0');
        ctx.beginPath();ctx.moveTo(x,y);
        ctx.lineTo(x+Math.sin(angle)*strokeLen,y-Math.cos(angle)*strokeLen*0.55);
        ctx.strokeStyle=col+hex;ctx.lineWidth=lw;ctx.stroke();
      }
    }
    ctx.beginPath();ctx.moveTo(cx,baseY);ctx.lineTo(cx,baseY-20);
    ctx.strokeStyle=paperPass ? paper : inkD+'aa';
    ctx.lineWidth=paperPass ? 4 : 2.2;ctx.stroke();
  }

  if(instant){
    drawStrokes(0, totalStrokes, true);  // paper pass
    drawStrokes(0, totalStrokes, false); // ink pass
    if(onDone) onDone();
    return ()=>{};
  }

  // scattered mode
  if(spfOverride && spfOverride < 20){
    const indices = Array.from({length:totalStrokes},(_,i)=>i);
    for(let i=indices.length-1;i>0;i--){
      const j=Math.floor(noise(i*0.1,seed*0.001,42)*(i+1));
      [indices[i],indices[j]]=[indices[j],indices[i]];
    }
    let drawn=0;
    const spf2=spfOverride;
    function scatterFrame(){
      const end=Math.min(drawn+spf2,totalStrokes);
      for(let k=drawn;k<end;k++){ drawStrokes(indices[k],indices[k]+1,true); }
      for(let k=drawn;k<end;k++){ drawStrokes(indices[k],indices[k]+1,false); }
      drawn=end;
      if(drawn<totalStrokes) af=requestAnimationFrame(scatterFrame);
      else if(onDone) onDone();
    }
    af=requestAnimationFrame(scatterFrame);
    return ()=>{ if(af) cancelAnimationFrame(af); };
  }

  function frame(){
    const end=Math.min(progress+spf,totalStrokes);
    drawStrokes(progress, end, true);
    drawStrokes(progress, end, false);
    progress=end;
    if(progress<totalStrokes) af=requestAnimationFrame(frame);
    else if(onDone) onDone();
  }
  af=requestAnimationFrame(frame);
  return ()=>{ if(af) cancelAnimationFrame(af); };
}

// drum roller
const rollerRanges = [[0,2],[0,9],[0,9]];
let rollerDigits = [1,7,0];
const ITEM_H = 56;

function buildDrum(idx){
  const [lo, hi] = rollerRanges[idx];
  const drum = document.getElementById('drum'+idx);
  const track = document.createElement('div');
  track.className = 'roller-track';
  track.id = 'track'+idx;
  // build items: padding + digits + padding
  const digits = [];
  for(let v=lo; v<=hi; v++) digits.push(v);
  // prepend/append 2 for wrap illusion
  const padded = [...digits.slice(-2), ...digits, ...digits.slice(0,2)];
  padded.forEach(v => {
    const el = document.createElement('div');
    el.className = 'roller-item';
    el.textContent = v;
    track.appendChild(el);
  });
  drum.appendChild(track);
  setDrumPos(idx, rollerDigits[idx], false);
  addDrumEvents(idx);
}

function setDrumPos(idx, val, animate){
  const [lo, hi] = rollerRanges[idx];
  const track = document.getElementById('track'+idx);
  const count = hi - lo + 1;
  // offset: 2 padding items + val position, centre in 160px drum (centre = 80px, item centre = ITEM_H/2)
  const pos = 2 + (val - lo);
  const offset = -(pos * ITEM_H) + (160/2 - ITEM_H/2);
  track.style.transition = animate ? 'transform 0.18s cubic-bezier(0.25,0.8,0.25,1)' : 'none';
  track.style.transform = 'translateY('+offset+'px)';
}

function addDrumEvents(idx){
  const drum = document.getElementById('drum'+idx);
  let startY, startVal, lastY, lastT, vel=0;

  function getOffset(digitVal){
    const [lo]=rollerRanges[idx];
    const pos = 2 + (digitVal - lo);
    return -(pos * ITEM_H) + (160/2 - ITEM_H/2);
  }

  function getRange(col){
    const d=rollerDigits;
    if(col===0) return [0,2];
    if(col===1){
      if(d[0]===0) return [3,9];   // 030-099
      if(d[0]===2) return [0,7];   // 200-272
      return [0,9];                 // 100-199
    }
    if(col===2){
      if(d[0]===2 && d[1]===7) return [0,2]; // 270-272
      return [0,9];
    }
    return [0,9];
  }

  function clampVal(v){
    const [lo,hi]=getRange(idx);
    const count=hi-lo+1;
    return ((v-lo)%count+count)%count+lo;
  }

  function onStart(y){
    startY=y; startVal=rollerDigits[idx];
    lastY=y; lastT=Date.now(); vel=0;
    window._activeDrum=idx;
    document.getElementById('track'+idx).style.transition='none';
  }

  function onMove(y){
    if(window._activeDrum!==idx) return;
    const now=Date.now(), dt=now-lastT||1;
    vel=(lastY-y)/dt; lastY=y; lastT=now;
    const dy=startY-y; // positive = dragged up = going to higher numbers
    // continuous pixel offset — don't round during drag
    const [lo,hi]=rollerRanges[idx], count=hi-lo+1;
    const baseOffset = getOffset(startVal);
    const track=document.getElementById('track'+idx);
    track.style.transform='translateY('+(baseOffset+y-startY)+'px)';
    // update digit for heightVal feedback
    const delta=Math.round(dy/ITEM_H);
    rollerDigits[idx]=clampVal(startVal+delta);
    document.getElementById('heightVal').value=rollerDigits.join('');
  }

  function onEnd(){
    if(window._activeDrum!==idx) return;
    window._activeDrum=null;
    // momentum: how many extra items to coast
    const coast=Math.round(vel*120/ITEM_H);
    const delta=Math.round((startY-lastY)/ITEM_H)+coast;
    const target=clampVal(startVal+delta);
    rollerDigits[idx]=target;
    // re-constrain dependent digits
    const d=rollerDigits;
    if(idx===0||idx===1){
      const lo1=d[0]===0?3:d[0]===2?0:0, hi1=d[0]===0?9:d[0]===2?7:9;
      if(d[1]<lo1){d[1]=lo1; setDrumPos(1,lo1,true);}
      if(d[1]>hi1){d[1]=hi1; setDrumPos(1,hi1,true);}
    }
    if(idx===0||idx===1||idx===2){
      const lo2=d[0]===2&&d[1]===7?0:0, hi2=d[0]===2&&d[1]===7?2:9;
      if(d[2]<lo2){d[2]=lo2; setDrumPos(2,lo2,true);}
      if(d[2]>hi2){d[2]=hi2; setDrumPos(2,hi2,true);}
    }
    document.getElementById('heightVal').value=rollerDigits.join('');
    setDrumPos(idx, target, true);
  }

  drum.addEventListener('touchstart', e=>{ e.preventDefault(); onStart(e.touches[0].clientY); }, {passive:false});
  drum.addEventListener('touchmove',  e=>{ e.preventDefault(); onMove(e.touches[0].clientY); },  {passive:false});
  drum.addEventListener('touchend',   ()=>onEnd());
  drum.addEventListener('mousedown',  e=>{ e.preventDefault(); onStart(e.clientY); });
  window.addEventListener('mousemove', e=>{ if(window._activeDrum===idx) onMove(e.clientY); });
  window.addEventListener('mouseup',   ()=>onEnd());
}

document.addEventListener('DOMContentLoaded', ()=>{

});

/* ======= MIC / PITCH ======= */
let audioCtx=null,analyser=null,micStream=null,pitchInterval=null;
let isRecording=false,pitchSamples=[];

function toggleMic(){ if(!isRecording) startMic(); else stopMicAndPlant(); }

async function startMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    isRecording=true; pitchSamples=[];
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micStatus').textContent='zpívej';
    const arcCv=document.getElementById('micArcCanvas');
    arcCv.style.display='block';
    const arcCtx=arcCv.getContext('2d');
    const arcStart=performance.now();
    const arcDur=15000;
    window._arcAF=requestAnimationFrame(function arcStep(now){
      const prog=Math.min(1,(now-arcStart)/arcDur);
      arcCtx.clearRect(0,0,84,84);
      if(prog>0){
        arcCtx.beginPath();
        arcCtx.arc(42,42,38,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
        arcCtx.strokeStyle='#0e0d0b';
        arcCtx.lineWidth=1.5;
        arcCtx.lineCap='round';
        arcCtx.stroke();
      }
      if(prog<1) window._arcAF=requestAnimationFrame(arcStep);
    });
    if(window._micStopTimer) clearTimeout(window._micStopTimer);
    window._micStopTimer=setTimeout(()=>{ if(isRecording) stopMicAndPlant(); }, 15000);
    analyser.fftSize=8192;
    const freqBuf=new Float32Array(analyser.frequencyBinCount);
    const sr=audioCtx.sampleRate;
    const binHz=sr/analyser.fftSize;
    pitchInterval=setInterval(()=>{
      analyser.getFloatFrequencyData(freqBuf);
      // convert dB to linear magnitude
      const mag=new Float32Array(freqBuf.length);
      let noiseFloor=-100;
      for(let i=0;i<freqBuf.length;i++) noiseFloor=Math.max(noiseFloor,freqBuf[i]);
      const threshold=noiseFloor-30; // only bins within 30dB of peak
      for(let i=0;i<mag.length;i++) mag[i]=freqBuf[i]>threshold?Math.pow(10,freqBuf[i]/20):0;

      // harmonic product spectrum: multiply mag by mag[2x], mag[3x], mag[4x]
      const lo=Math.floor(70/binHz), hi=Math.ceil(800/binHz);
      let bestVal=0, bestBin=lo;
      for(let i=lo;i<hi;i++){
        const h2=Math.round(i*2), h3=Math.round(i*3), h4=Math.round(i*4);
        const v=mag[i]
          *(h2<mag.length?mag[h2]:0.001)
          *(h3<mag.length?mag[h3]:0.001)
          *(h4<mag.length?mag[h4]:0.001);
        if(v>bestVal){bestVal=v;bestBin=i;}
      }
      // only accept if signal is strong enough
      if(bestVal>0&&mag[bestBin]>0.001){
        const p=bestBin*binHz;
        if(p>80&&p<600) pitchSamples.push(p);
      }
    },150);
  }catch(e){
    document.getElementById('micStatus').textContent='mikrofon nedostupný';
  }
}

function stopMic(){
  if(window._micStopTimer){clearTimeout(window._micStopTimer);window._micStopTimer=null;}
  const arcCv=document.getElementById('micArcCanvas');
  if(arcCv){arcCv.style.display='none';}
  if(window._arcAF){cancelAnimationFrame(window._arcAF);window._arcAF=null;}
  if(pitchInterval){clearInterval(pitchInterval);pitchInterval=null;}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  isRecording=false;
  const mb=document.getElementById('micBtn');
  if(mb) mb.classList.remove('recording');
  const ms=document.getElementById('micStatus');
  if(ms) ms.textContent='zpívej';
}

function stopMicAndPlant(){
  if(pitchSamples.length<3){
    stopMic();
    plantAndShowForest(170, Math.random()*1000);
    return;
  }
  // fold all pitches into one octave (remove octave errors)
  // then find the densest cluster
  const folded = pitchSamples.map(p => {
    let f = p;
    while(f > 800) f /= 2;  // fold down
    while(f < 80) f *= 2;   // fold up
    return f;
  });
  // histogram: bins from 80-400Hz
  const bins = new Array(60).fill(0);
  folded.forEach(f => {
    const bin = Math.round(Math.log2(f/80)*12);
    if(bin>=0 && bin<60) bins[bin]++;
  });
  // find peak bin
  const peak = bins.indexOf(Math.max(...bins));
  const medF = 80 * Math.pow(2, peak/12);
  const estH = pitchToHeight(medF);
  stopMic();
  setTimeout(()=>plantAndShowForest(estH, Math.random()*1000), 300);
}

function pitchToHeight(hz){
  // 80→195cm, 260→168cm, 500→88cm, 800→30cm
  const f = Math.max(80, Math.min(800, hz));
  if(f <= 260){
    const t = (Math.log(f)-Math.log(80))/(Math.log(260)-Math.log(80));
    return Math.max(30, Math.min(272, Math.round(195 - t*27)));
  } else if(f <= 500){
    const t = (Math.log(f)-Math.log(260))/(Math.log(500)-Math.log(260));
    return Math.max(30, Math.min(272, Math.round(168 - t*80)));
  } else {
    const t = (Math.log(f)-Math.log(500))/(Math.log(800)-Math.log(500));
    return Math.max(30, Math.min(272, Math.round(88 - t*58)));
  }
}

function detectPitch(buf,sr){
  const SIZE=buf.length; let rms=0;
  for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/SIZE)<0.01) return -1;
  let r1=0,r2=SIZE-1;
  for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<0.2){r1=i;break;}}
  for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<0.2){r2=SIZE-i;break;}}
  const b2=buf.slice(r1,r2);
  const c=new Float32Array(b2.length*2);
  for(let i=0;i<b2.length;i++) for(let j=0;j<b2.length;j++) c[i+j]+=b2[j]*b2[i];
  let d=0; while(c[d]>c[d+1])d++;
  let maxv=-1,maxp=-1;
  for(let i=d;i<b2.length/2;i++){if(c[i]>maxv){maxv=c[i];maxp=i;}}
  if(maxp<0)return -1;
  let T=maxp;
  if(T>0&&T<c.length-1){const a=c[T-1],b=c[T],cc=c[T+1];T+=(cc-a)/(2*(2*b-cc-a));}
  return sr/T;
}


/* ======= MELODY PLAYER ======= */
// ABC: ccB2 A2 G2 | E4 | ccB2 A2 G2 | B4 | BBB2 B2 d2 | A4 | ccB2 A2 G2 | E4
// intervals relative to base note (semitones from E): E=0,G=3,A=5,B=7,c=12,d=14
// melody in scale degrees from root:
// using C major: C=0,D=2,E=4,F=5,G=7,A=9,B=11,c=12,d=14
// song is in C, root = E (degree 4). We'll play relative to a base freq.
// note sequence with durations (beats at ~72bpm = 0.833s/beat, half-beat=0.417s)
function playMelodyAtFreq(baseHz, onDone){
  const ac = new (window.AudioContext||window.webkitAudioContext)();
  // semitone ratios from E (tonic)
  const R = {
    E: 1,
    G: Math.pow(2, 3/12),   // +3 semitones
    A: Math.pow(2, 5/12),   // +5
    B: Math.pow(2, 7/12),   // +7
    c: Math.pow(2, 8/12),   // +8 (C5)
    d: Math.pow(2, 10/12),  // +10 (D5)
  };
  const e8 = 0.25; // eighth note duration at 120bpm
  // [note|null, eighths]  null = rest
  const mel = [
    ['c',1],['c',1],['B',2],['A',2],['G',2],['E',4],[null,4],
    ['c',1],['c',1],['B',2],['A',2],['G',2],['B',4],[null,4],
    ['B',1],['B',1],['B',2],['B',2],['d',2],['A',4],[null,4],
    ['c',1],['c',1],['B',2],['A',2],['G',2],['E',4],[null,4],
  ];
  let t = ac.currentTime + 0.1;
  mel.forEach(([note, eighths])=>{
    const dur = eighths * e8;
    if(note){
      const freq = baseHz * R[note];

      // two slightly detuned sines — chorus effect, airy and breathy
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;

      const osc2 = ac.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freq * 1.003;

      // reverb via convolver with synthetic impulse response
      if(!ac._reverb){
        const len = ac.sampleRate * 1.2;
        const ir = ac.createBuffer(2, len, ac.sampleRate);
        for(let ch=0;ch<2;ch++){
          const d = ir.getChannelData(ch);
          for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.5);
        }
        const conv = ac.createConvolver();
        conv.buffer = ir;
        const reverbGain = ac.createGain();
        reverbGain.gain.value = 0.22;
        conv.connect(reverbGain);
        reverbGain.connect(ac.destination);
        ac._reverb = conv;
      }

      const gain = ac.createGain();
      // perceptual loudness compensation — higher freq sounds louder at same amplitude
      const vol = 0.18 * Math.sqrt(165 / freq);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t+0.10);
      gain.gain.setValueAtTime(vol, t+dur-0.08);
      gain.gain.linearRampToValueAtTime(0, t+dur);

      const gain2 = ac.createGain();
      const vol2 = vol * 0.67;
      gain2.gain.setValueAtTime(0, t);
      gain2.gain.linearRampToValueAtTime(vol2, t+0.12);
      gain2.gain.setValueAtTime(vol2, t+dur-0.08);
      gain2.gain.linearRampToValueAtTime(0, t+dur);

      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(ac.destination);  gain.connect(ac._reverb);
      gain2.connect(ac.destination); gain2.connect(ac._reverb);
      osc.start(t); osc.stop(t+dur);
      osc2.start(t); osc2.stop(t+dur);
    }
    t += dur;
  });
  setTimeout(()=>{ ac.close(); if(onDone) onDone(); }, (t-ac.currentTime+0.3)*1000);
}

function heightToFreq(cm){
  // 30-150cm: 800→329Hz, 150-272cm: 329→123Hz (wider adult spread)
  if(cm <= 150){
    const t = Math.max(0,Math.min(1,(Math.log(cm)-Math.log(30))/(Math.log(150)-Math.log(30))));
    return 800 * Math.pow(329/800, t);
  } else {
    const t = Math.max(0,Math.min(1,(Math.log(cm)-Math.log(150))/(Math.log(272)-Math.log(150))));
    return 329 * Math.pow(123/329, t);
  }
}

/* ======= FOREST PAGE ======= */
async function drawForestPage(){
  const canvas = document.getElementById('forestCanvas');
  const ctx = canvas.getContext('2d');

  let trees = [];
  if(window.loadForest){
    try { trees = await window.loadForest(); } catch(e){ console.error(e); }
  }
  if(trees.length === 0) return;

  const n = trees.length;
  const innerW = document.querySelector('.forest-inner').offsetWidth || 800;
  const W = innerW;
  const H = Math.round(window.innerHeight * 0.92);
  canvas.width = W; canvas.height = H;
  // immediately wipe canvas and show loading stroke
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#f0ece3';
  ctx.fillRect(0,0,W,H);

  // animated loading stroke — one jalovec-like mark bouncing while we compute
  let _loadAF;
  (function animateLoad(){
    function lstep(now){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#f0ece3'; ctx.fillRect(0,0,W,H);
      const cx=W/2, cy=H*0.5, r=32, s=now/1000;
      for(let i=0;i<30;i++){
        const angle=(i/30)*Math.PI*2;
        const pulse=0.5-0.5*Math.cos(s*2.5-i*0.42);
        const x=cx+Math.cos(angle)*r;
        const y=cy+Math.sin(angle)*r;
        ctx.globalAlpha=0.15+pulse*0.7;
        ctx.beginPath();
        ctx.arc(x,y,1.8,0,Math.PI*2);
        ctx.fillStyle='#0e0d0b'; ctx.fill();
      }
      ctx.globalAlpha=1;
      _loadAF=requestAnimationFrame(lstep);
    }
    _loadAF=requestAnimationFrame(lstep);
  })();

  function depth(i){ if(n===1) return 0; const maxD=Math.min(1,(n-1)/20); return maxD*(n-1-i)/(n-1); }

  function perspParams(i){
    const d = depth(i);
    const scaleF = 1 - d*0.72;
    const slotH = Math.round(H*0.82*scaleF);
    const baseY = Math.round(H*0.88 - d*H*0.55);
    const alphaM = Math.pow(1-d, 4.0)*0.82 + 0.02;
    return {slotH, baseY, alphaM};
  }

  function treeCx(i){
    const d = depth(i);
    // use seed directly for more spread — avoids clustering with small i values
    const base = noise(trees[i].seed*0.17+i*3.1, i*2.9+trees[i].seed*0.05, 99);
    const margin = 0.06 + d*0.04;
    return Math.max(80, Math.min(W-80, Math.round(W*(margin + base*(1-margin*2)))));
  }

  const pastIndices = n > 1
    ? Array.from({length:n-1},(_,i)=>i).sort((a,b)=>depth(b)-depth(a))
    : [];

  // collect strokes for flicker animation
  function collectTreeStrokes(treeIdx){
    const {slotH, baseY, alphaM} = perspParams(treeIdx);
    const cx = treeCx(treeIdx);
    const t = trees[treeIdx];
    const inkD='#0e0d0b', inkM='#2a2820', inkL='#5a5650';
    const treeH = Math.round((t.height/210)*slotH*0.78+slotH*0.12);
    const topY = baseY-treeH, maxW = treeH*0.38;
    const strokes = [];
    const step=Math.ceil(5000/1500);
    for(let i=0;i<5000;i+=step){
      const tt=i/5000, y=topY+tt*treeH, relY=tt;
      const profile=Math.pow(relY,0.42)*(1-Math.pow(relY,9)*0.25);
      const bw=profile*maxW;
      const nL=fbm(0.3,relY*3.2,t.seed,4), nR=fbm(1.7,relY*3.2,t.seed+500,4);
      const wob=bw*0.32;
      const lx=cx-bw*(0.5+(nL-0.5)*0.6)-wob*(nL-0.3);
      const rx=cx+bw*(0.5+(nR-0.5)*0.6)+wob*(nR-0.3);
      const span=rx-lx; if(span<1) continue;
      const density=fbm(i*0.07,relY*2,t.seed+200,3);
      if(density<0.12) continue;
      const sc=Math.floor(density*7)+1;
      for(let s=0;s<sc;s++){
        const nx=fbm(s*3.1,i*0.13+s,t.seed+100,2);
        const x=lx+nx*span; if(x<lx||x>rx) continue;
        const shadowN=fbm(x*0.018,y*0.018,t.seed+900,5);
        const clumpN=fbm(x*0.045,y*0.045,t.seed+410,4);
        const detailN=fbm(x*0.11,y*0.11,t.seed+620,3);
        const depthVal=shadowN*0.55+clumpN*0.30+detailN*0.15;
        const edgeDist=Math.min(x-lx,rx-x)/span;
        const isEdge=edgeDist<0.10;
        let strokeLen,lw,alpha,col;
        if(isEdge){strokeLen=3+depthVal*8;lw=1.0+depthVal*0.8;alpha=(0.75+depthVal*0.25)*alphaM;col=inkD;}
        else if(depthVal>0.62){strokeLen=2+depthVal*6;lw=0.9+depthVal*0.5;alpha=(0.55+depthVal*0.35)*alphaM;col=inkD;}
        else if(depthVal>0.40){strokeLen=1.5+depthVal*4;lw=0.7;alpha=(0.30+depthVal*0.30)*alphaM;col=inkM;}
        else{strokeLen=1+depthVal*3;lw=0.5;alpha=(0.10+depthVal*0.20)*alphaM;col=inkL;}
        const angle=(fbm(x*0.05,y*0.05,t.seed+333,2)-0.5)*0.7;
        strokes.push({x,y,angle,strokeLen,lw,alpha,col});
      }
    }
    return strokes;
  }

  const allInkStrokes = [];
  for(const i of pastIndices){
    for(const s of collectTreeStrokes(i)) allInkStrokes.push(s);
  }
  const N = allInkStrokes.length;

  let lcg = 1664525*13+1013904223;
  function lcgRand(){ lcg=(Math.imul(1664525,lcg)+1013904223)|0; return (lcg>>>0)/0xFFFFFFFF; }

  const noiseStrokes = Array.from({length:N}, ()=>({
    x:lcgRand()*W, y:lcgRand()*H,
    angle:(lcgRand()-0.5)*Math.PI,
    strokeLen:2+lcgRand()*8, lw:0.5+lcgRand()*0.8,
    alpha:0.06+lcgRand()*0.18,
  }));
  const dieTimes = noiseStrokes.map(()=> 0.2+lcgRand()*0.8);

  const FFRAMES = 16;
  const noiseVis = new Uint8Array(N*FFRAMES);
  const inkVis   = new Uint8Array(N*FFRAMES);
  for(let f=0;f<FFRAMES;f++){
    for(let k=0;k<N;k++) noiseVis[f*N+k] = lcgRand()<0.55 ? 1:0;
    for(let k=0;k<N;k++) inkVis[f*N+k]   = lcgRand()<0.5  ? 1:0;
  }

  // build offscreen trees one per frame so loading dots stay visible
  const offscreen = document.createElement('canvas');
  offscreen.width=W; offscreen.height=H;
  const octx = offscreen.getContext('2d');
  const _buildQueue = [...pastIndices];
  function buildNext(resolve){
    if(_buildQueue.length===0){ resolve(); return; }
    const i=_buildQueue.shift();
    const {slotH, baseY, alphaM}=perspParams(i);
    const tmp=document.createElement('canvas');
    tmp.width=W; tmp.height=H;
    drawJalovec(tmp,trees[i].height,trees[i].seed,null,treeCx(i),baseY,slotH,true);
    octx.globalAlpha=alphaM;
    octx.drawImage(tmp,0,0);
    requestAnimationFrame(()=>buildNext(resolve));
  }
  new Promise(resolve=>{ requestAnimationFrame(()=>buildNext(resolve)); }).then(()=>{
  octx.globalAlpha=1;

  function flickerReveal(durationMs, onDone){
    if(_loadAF){ cancelAnimationFrame(_loadAF); _loadAF=null; }
    const start = performance.now();
    let frame = 0;
    function step(now){
      const t = Math.min(1,(now-start)/durationMs);
      const f = (frame++)%FFRAMES;
      const treeAlpha = 0.15 + Math.min(0.85, t*1.5);
      ctx.clearRect(0,0,W,H);

      const nBase=f*N;
      for(let k=0;k<N;k++){
        if(t>=dieTimes[k]||!noiseVis[nBase+k]) continue;
        const s=noiseStrokes[k];
        const fadeOut=Math.max(0,1-t/dieTimes[k]);
        ctx.globalAlpha=s.alpha*fadeOut;
        ctx.beginPath(); ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x+Math.cos(s.angle)*s.strokeLen, s.y+Math.sin(s.angle)*s.strokeLen*0.5);
        ctx.strokeStyle='#0e0d0b'; ctx.lineWidth=s.lw; ctx.stroke();
      }

      const iBase=f*N;
      for(let k=0;k<N;k++){
        if(!inkVis[iBase+k]) continue;
        const s=allInkStrokes[k];
        const hex=Math.round(s.alpha*treeAlpha*255).toString(16).padStart(2,'0');
        ctx.globalAlpha=1;
        ctx.beginPath(); ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x+Math.sin(s.angle)*s.strokeLen, s.y-Math.cos(s.angle)*s.strokeLen*0.55);
        ctx.strokeStyle=s.col+hex; ctx.lineWidth=s.lw; ctx.stroke();
      }
      ctx.globalAlpha=1;

      if(t<1){ requestAnimationFrame(step); }
      else {
        // crossfade from last flicker frame into clean offscreen over ~400ms
        const fadeStart = performance.now();
        function crossfade(now){
          const ft = Math.min(1,(now-fadeStart)/400);
          ctx.clearRect(0,0,W,H);
          ctx.globalAlpha = ft;
          ctx.drawImage(offscreen,0,0);
          ctx.globalAlpha = 1;
          if(ft<1) requestAnimationFrame(crossfade);
          else if(onDone) onDone();
        }
        requestAnimationFrame(crossfade);
      }
    }
    requestAnimationFrame(step);
  }

  flickerReveal(6000, ()=>{
    const last = n-1;
    const {slotH} = perspParams(last);
    const baseY = Math.round(H*0.93);
    const newSlotH = Math.round(H*0.88);
    const cx = treeCx(last);
    ctx.globalAlpha=1;

    const snap = document.createElement('canvas');
    snap.width=W; snap.height=H;

    drawJalovec(canvas, trees[last].height, trees[last].seed, ()=>{
      snap.getContext('2d').drawImage(canvas,0,0);
      const labelStart = performance.now();
      function fadeLabels(now){
        const lt = Math.min(1,(now-labelStart)/1500);
        ctx.clearRect(0,0,W,H);
        ctx.drawImage(snap,0,0);
        for(const i of [...pastIndices,last]){
          const by = (i===last) ? baseY : perspParams(i).baseY;
          const tcx=treeCx(i), d=depth(i);
          ctx.globalAlpha=(1-d*0.55)*0.85*(lt*lt);
          ctx.font=Math.round(13*(1-d*0.38))+"px 'IM Fell English', serif";
          ctx.fillStyle='#5a5650'; ctx.textAlign='center';
          ctx.fillText(trees[i].height+' cm', tcx, by+22);
        }
        ctx.globalAlpha=1;
        if(lt<1) requestAnimationFrame(fadeLabels);
      }
      requestAnimationFrame(fadeLabels);
      // auto-return to landing after 60s
      setTimeout(()=>goToLanding(), 62000);
    }, cx, baseY, newSlotH, false, 10, true);
  });
  }, 50);
}
</script>
</body>
</html>
